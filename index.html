<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>51Talk Official Progress Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Outfit', sans-serif; }
    body { background: #f8fafc; min-height: 100vh; padding: 20px; }
    .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 24px 24px 0 0; color: white; }
    .report-card { background: #ffffff; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); max-width: 950px; margin: 0 auto; }
    .skill-card { background: white; border: 1px solid #f1f5f9; border-radius: 20px; padding: 20px; }
    .progress-bar-bg { background: #f1f5f9; height: 8px; border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }
    .logo-frame { border-radius: 1.2rem; background: white; padding: 0.8rem; box-shadow: 0 10px 15px rgba(0,0,0,0.1); width: 160px; min-height: 60px; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>

  <div class="no-print max-w-[950px] mx-auto mb-8 bg-white p-5 rounded-3xl shadow-lg flex flex-wrap gap-4 items-end border border-slate-100">
    <div class="flex-1 min-w-[200px]">
      <label class="block text-slate-400 text-[10px] font-bold mb-2 uppercase tracking-widest text-right">قائمة الطلاب / Student List</label>
      <select id="studentSelect" onchange="renderStudent()" class="w-full p-3 rounded-xl border border-slate-200 font-bold text-slate-800 outline-none bg-slate-50">
        <option value="">-- جاري تحميل البيانات... --</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button onclick="fetchData()" class="bg-indigo-50 text-indigo-600 px-5 py-3 rounded-xl font-bold hover:bg-indigo-100 transition-all">Refresh 🔄</button>
      <button onclick="downloadImage()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-black transition-all">Save Image 🖼️</button>
    </div>
  </div>

  <div id="reportArea" class="report-card opacity-0 transition-opacity duration-700">
    <div id="captureTarget" class="bg-white">
      <div class="header-gradient p-10 flex flex-col items-center text-center">
        <div class="mb-6 logo-frame flex items-center justify-center">
          <img src="https://raw.githubusercontent.com/bpiy-netizen/english-reports-1/main/logo.png" id="logoImg" style="max-height: 60px; max-width: 140px;" alt="51Talk Logo">
        </div>
        <h1 class="text-3xl font-black tracking-tighter mb-1 uppercase italic text-white">Performance Progress Report</h1>
        <p class="text-slate-400 text-sm font-medium uppercase tracking-[0.3em]">Official Certification</p>
      </div>

      <div class="p-10">
        <div class="flex justify-between items-end mb-10 pb-8 border-b border-slate-50">
          <div>
            <h2 id="cardName" class="text-5xl font-black text-slate-900 mb-1 italic">Student Name</h2>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">Active Academic Path</p>
            </div>
          </div>
          <div class="text-right">
            <div class="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-tighter">Issue Date</div>
            <div id="dispDate" class="text-lg font-bold text-slate-800 italic">--/--/----</div>
          </div>
        </div>

        <div id="skillsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-10">
          </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 pt-6">
          <div class="lg:col-span-2 bg-slate-50 p-6 rounded-3xl border border-slate-100">
            <h3 class="text-slate-400 text-[10px] font-black uppercase mb-3 tracking-widest">Academic Feedback</h3>
            <p id="studentNote" class="text-lg text-slate-700 leading-relaxed font-medium italic italic">الرجاء اختيار طالب لعرض البيانات...</p>
          </div>
          <div class="bg-indigo-600 rounded-3xl p-6 text-white flex flex-col justify-center shadow-xl">
            <h3 class="text-indigo-200 text-[10px] font-black uppercase mb-1 tracking-widest text-center">Next Milestone</h3>
            <div id="nextGoal" class="text-3xl font-black text-center">Level --</div>
          </div>
        </div>
      </div>

      <div class="p-8 bg-slate-50/50 border-t border-slate-100 flex justify-between items-center rounded-b-3xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-bold text-xl uppercase">HN</div>
            <div>
                <div class="text-slate-400 text-[9px] font-black uppercase tracking-tighter">Expert Consultant</div>
                <div id="consultantNameDisplay" class="text-md font-bold text-slate-800 italic">Hussam Naser</div>
            </div>
        </div>
        <div class="flex gap-8">
            <div class="text-right border-r pr-8 border-slate-200">
                <div class="text-slate-400 text-[9px] font-black uppercase mb-1">Current Score</div>
                <div class="text-2xl font-black text-slate-900"><span id="avgNow">0</span>%</div>
            </div>
            <div class="text-right">
                <div class="text-slate-400 text-[9px] font-black uppercase mb-1 text-emerald-500">Growth</div>
                <div class="text-2xl font-black text-emerald-600">+<span id="avgDiff">0</span>%</div>
            </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0TrGJYR9ywCx79tzUu8JGiOASatbpL6EBUNsgZYjGBc0wtI_vbhGsayUhqU0YJOdmwkWZHgAIWNZY/pub?output=csv";
    let students = [];

    async function fetchData() {
      try {
        const response = await fetch(sheetURL + '&cache=' + new Date().getTime());
        const text = await response.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        students = rows.slice(1).map(row => {
          const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
          return {
            name: c[0],
            skills: [
              { label: "Reading", now: c[1], old: c[2], color: "#6366f1", icon: "📖" },
              { label: "Vocab", now: c[3], old: c[4], color: "#ec4899", icon: "📝" },
              { label: "Listening", now: c[5], old: c[6], color: "#3b82f6", icon: "🎧" },
              { label: "Speaking", now: c[7], old: c[8], color: "#f59e0b", icon: "🗣️" },
              { label: "Grammar", now: c[9], old: c[10], color: "#10b981", icon: "📏" }
            ],
            date: c[11], note: c[12], goal: c[13], consultant: c[14]
          };
        });
        const sel = document.getElementById('studentSelect');
        sel.innerHTML = '<option value="">-- Select Student / اختر الطالب --</option>';
        students.forEach((s, i) => {
          let opt = document.createElement('option'); opt.value = i; opt.innerText = s.name; sel.appendChild(opt);
        });
      } catch (e) { alert("حدث خطأ في تحميل البيانات"); }
    }

    function renderStudent() {
      const idx = document.getElementById('studentSelect').value;
      if (idx === "") return;
      const s = students[idx];
      document.getElementById('reportArea').classList.replace('opacity-0', 'opacity-100');
      document.getElementById('cardName').innerText = s.name;
      document.getElementById('dispDate').innerText = s.date || "2026";
      document.getElementById('studentNote').innerText = (s.note || "Focus on your goals!").replace(/Foucs/g, 'Focus');
      document.getElementById('nextGoal').innerText = s.goal ? "Level " + s.goal : "Next Step";
      document.getElementById('consultantNameDisplay').innerText = s.consultant || "Hussam Naser";

      let sumNow = 0, sumDiff = 0;
      const grid = document.getElementById('skillsGrid');
      grid.innerHTML = "";
      
      s.skills.forEach(skill => {
        const n = parseInt(skill.now) || 0;
        const d = n - (parseInt(skill.old) || 0);
        sumNow += n; sumDiff += d;
        grid.innerHTML += `
          <div class="skill-card">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${skill.icon} ${skill.label}</span>
                <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${d >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${d >= 0 ? '▲' : '▼'} ${Math.abs(d)}%</span>
            </div>
            <div class="text-2xl font-black mb-2">${n}%</div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${n}%; background: ${skill.color}"></div></div>
          </div>`;
      });
      document.getElementById('avgNow').innerText = Math.round(sumNow / 5);
      document.getElementById('avgDiff').innerText = Math.abs(Math.round(sumDiff / 5));
    }

    function downloadImage() {
      const target = document.getElementById('captureTarget');
      html2canvas(target, { 
        scale: 3, 
        useCORS: true, 
        allowTaint: true,
        backgroundColor: "#ffffff"
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = `51Talk_Report_${document.getElementById('cardName').innerText}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }

    window.onload = fetchData;
  </script>
</body>
</html>
