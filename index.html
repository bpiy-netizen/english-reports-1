<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>51Talk Official Progress Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    body { background: #f3f4f6; min-height: 100vh; padding: 20px; color: #1f2937; }
    
    .header-gradient { 
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%); 
      border-radius: 24px 24px 0 0; 
      color: white; 
    }
    .report-card { 
      background: #ffffff; 
      border-radius: 24px; 
      box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.1); 
      max-width: 1000px; margin: 0 auto; 
    }
    .skill-card { 
      background: white; border: 1px solid #f1f5f9; border-radius: 20px; padding: 24px; 
    }
    .progress-bar-bg { background: #f1f5f9; height: 10px; border-radius: 5px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 5px; transition: width 1.5s ease-out; }
    
    .logo-frame { 
      border-radius: 2rem;
      background: white;
      padding: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 100px;
    }

    .human-signature { 
      font-family: 'Inter', sans-serif; color: #1a202c; font-size: 1.6rem; 
      font-weight: 600; transform: rotate(-1.5deg); display: inline-block;
    }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>

  <div class="no-print max-w-5xl mx-auto mb-10 bg-white p-6 rounded-3xl shadow-xl flex flex-wrap gap-4 items-end border border-slate-100">
    <div class="flex-1 min-w-[250px]">
      <label class="block text-slate-500 text-xs font-bold mb-3 uppercase tracking-[0.2em] text-right">Student Record Access</label>
      <select id="studentSelect" onchange="renderStudent()" class="w-full p-4 rounded-2xl border border-slate-200 text-slate-900 font-bold outline-none">
        <option value="">-- Loading... --</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button onclick="fetchData()" class="bg-sky-600 text-white px-6 py-4 rounded-2xl font-bold transition-all">Update 🔄</button>
      <button onclick="downloadImage()" class="bg-emerald-600 text-white px-6 py-4 rounded-2xl font-bold shadow-lg">Save Image 🖼️</button>
    </div>
  </div>

  <div id="reportArea" class="report-card opacity-0 transition-opacity duration-500">
    <div id="captureTarget">
      <div class="header-gradient p-12 flex flex-col items-center">
        <div class="mb-8 logo-frame">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAABACAMAAAD9STv3AAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAADNQTFRF////5OTk8vLyxsbG0NDQvLy82NjY4+Pj6+vrwMDA7+/v9PT0u7u7zMzM1NTU3d3d5+fnXul2EwAAAF9JREFUeNrs0UESgCAIBVCG//9m99At9FpAmS68iYggAAAAAAAAAICp6p6Z6p5rX+v6Yq2vG+v9WmvX66XWrbVWrLViLxZ7stiT9Z6s92S9Z8v9u7TeS61ba63YisV+AgwA93YEn6vY9OEAAAAASUVORK5CYII=" 
               id="mainLogo" class="w-40" alt="51Talk Logo">
        </div>
        <h1 class="text-6xl md:text-8xl font-black mb-8" id="cardName">Student Name</h1>
        <div class="flex gap-10 pt-6 border-t border-white/10">
          <div><p class="text-[10px] uppercase opacity-40 mb-1">Report Date</p><p class="text-sm font-bold" id="dispDate">-</p></div>
          <div class="w-px h-10 bg-white/10"></div>
          <div><p class="text-[10px] uppercase opacity-40 mb-1">Status</p><p class="text-sm font-bold text-emerald-400">On Track</p></div>
        </div>
      </div>

      <div class="p-8 md:p-14 space-y-10 bg-white rounded-b-[24px]">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 items-center bg-slate-50 p-10 rounded-[2.5rem]">
          <div class="flex items-center gap-5 col-span-2">
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-3xl shadow-sm">🏆</div>
            <div><h3 class="font-bold text-slate-900 text-xl">Period Score</h3></div>
          </div>
          <div class="text-center md:border-r border-slate-200">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Grade</p>
            <div class="text-5xl font-black text-sky-600"><span id="avgNow">0</span>%</div>
          </div>
          <div class="text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Growth</p>
            <div class="text-4xl font-bold text-slate-800"><span id="avgDiff">0</span>% <span id="avgTrendIcon"></span></div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="skillsGrid"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100">
                <h4 class="text-slate-400 font-bold text-[10px] uppercase mb-4">Consultant Feedback</h4>
                <p id="studentNote" class="text-slate-700 italic text-lg leading-relaxed"></p>
            </div>
            <div class="bg-amber-50 p-8 rounded-[2rem] border-2 border-dashed border-amber-200">
                <h4 class="text-amber-900 font-bold text-[10px] uppercase mb-3">Next Milestone</h4>
                <p id="nextGoal" class="text-amber-900 font-black text-2xl"></p>
            </div>
        </div>

        <div class="mt-16 pt-10 border-t flex justify-between items-end">
          <div>
            <p class="text-slate-400 text-[10px] font-bold uppercase">Official Document</p>
            <p class="text-slate-900 font-mono text-[9px] opacity-40">CERT-51T-VERIFIED-2026</p>
          </div>
          <div class="text-right">
            <p id="consultantNameDisplay" class="human-signature">Consultant</p>
            <p class="text-slate-900 font-black text-xs uppercase tracking-tighter">Educational Consultant Team</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0TrGJYR9ywCx79tzUu8JGiOASatbpL6EBUNsgZYjGBc0wtI_vbhGsayUhqU0YJOdmwkWZHgAIWNZY/pub?output=csv";
    let students = [];

    // استخدمت هنا لوجو نصي ذكي لـ 51Talk في حال فشل تحميل الصورة مجدداً
    const logoPlaceholder = "https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/51Talk_logo.png/640px-51Talk_logo.png";
    document.getElementById('mainLogo').src = logoPlaceholder;

    async function fetchData() {
      try {
        const response = await fetch(sheetURL + '&cache=' + new Date().getTime());
        const text = await response.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        students = rows.slice(1).map(row => {
          const c = parseCSVRow(row);
          return {
            name: c[0],
            skills: [
              { label: "Reading", now: c[1], old: c[2], color: "#6366f1", icon: "📖" },
              { label: "Vocabulary", now: c[3], old: c[4], color: "#ec4899", icon: "📝" },
              { label: "Listening", now: c[5], old: c[6], color: "#3b82f6", icon: "🎧" },
              { label: "Speaking", now: c[7], old: c[8], color: "#f59e0b", icon: "🗣️" },
              { label: "Grammar", now: c[9], old: c[10], color: "#10b981", icon: "📏" }
            ],
            date: c[11], note: c[12], goal: c[13], consultant: c[14]
          };
        });

        const sel = document.getElementById('studentSelect');
        sel.innerHTML = '<option value="">-- Select Student --</option>';
        students.forEach((s, i) => {
          let opt = document.createElement('option');
          opt.value = i; opt.innerText = s.name;
          sel.appendChild(opt);
        });
      } catch (e) { console.error(e); }
    }

    function parseCSVRow(text) {
        let results = [], current = '', inQuotes = false;
        for (let char of text) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { results.push(current.trim()); current = ''; }
            else current += char;
        }
        results.push(current.trim()); return results;
    }

    function renderStudent() {
      const idx = document.getElementById('studentSelect').value;
      if (idx === "") return;
      const s = students[idx];
      document.getElementById('reportArea').classList.remove('opacity-0');
      document.getElementById('cardName').innerText = s.name;
      document.getElementById('dispDate').innerText = s.date;
      document.getElementById('studentNote').innerText = (s.note || "Keep up the great work!").replace(/Foucs/g, 'Focus');
      document.getElementById('nextGoal').innerText = s.goal ? "Level " + s.goal : "Next Milestone";
      document.getElementById('consultantNameDisplay').innerText = s.consultant;

      let sumNow = 0, sumDiff = 0, count = 0;
      const grid = document.getElementById('skillsGrid');
      grid.innerHTML = "";

      s.skills.forEach(skill => {
        const nowVal = parseInt(skill.now) || 0;
        const diff = nowVal - (parseInt(skill.old) || 0);
        sumNow += nowVal; sumDiff += diff; count++;
        grid.innerHTML += `
          <div class="skill-card">
            <div class="flex justify-between mb-4">
              <span class="text-[10px] font-black text-slate-400 uppercase">${skill.icon} ${skill.label}</span>
              <span class="text-[9px] font-bold px-2 py-0.5 rounded-md ${diff >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                ${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff)}%
              </span>
            </div>
            <div class="text-3xl font-bold mb-3">${nowVal}%</div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${nowVal}%; background: ${skill.color}"></div></div>
          </div>`;
      });
      
      const avgDiff = Math.round(sumDiff / count);
      document.getElementById('avgNow').innerText = Math.round(sumNow / count);
      document.getElementById('avgDiff').innerText = Math.abs(avgDiff);
      document.getElementById('avgTrendIcon').innerText = avgDiff >= 0 ? "📈" : "📉";
    }

    function downloadImage() {
      const target = document.getElementById('captureTarget');
      html2canvas(target, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
        const link = document.createElement('a');
        link.download = `51Talk_Report_${document.getElementById('cardName').innerText}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }

    window.onload = fetchData;
  </script>
</body>
</html>
