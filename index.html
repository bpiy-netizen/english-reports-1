<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Progress Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); min-height: 100vh; padding: 20px; }
    .skill-bar { transition: width 1.5s ease-in-out; height: 100%; border-radius: 9999px; }
    @media print { .no-print { display: none !important; } body { background: white !important; padding: 0; } }
    .report-card { background: white; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div class="no-print max-w-4xl mx-auto mb-8 bg-white/20 backdrop-blur-md p-6 rounded-3xl border border-white/30 text-white shadow-xl text-center">
    <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
      <div class="flex-1">
        <label class="block text-sm font-bold mb-1">اختر اسم الطالب:</label>
        <select id="studentSelect" onchange="renderStudent()" class="p-3 rounded-xl text-gray-800 font-bold w-full">
          <option value="">-- جاري تحميل البيانات --</option>
        </select>
      </div>
      <button onclick="fetchData()" class="bg-purple-600 px-8 py-3 rounded-xl font-bold hover:bg-purple-700 transition self-end">تحديث 🔄</button>
      <button onclick="window.print()" class="bg-green-500 px-8 py-3 rounded-xl font-bold hover:bg-green-600 transition self-end">حفظ PDF 🖨️</button>
    </div>
  </div>

  <main id="reportArea" class="max-w-4xl mx-auto opacity-0 transition-opacity duration-700">
    <header class="text-center mb-8 text-white">
      <h1 class="text-4xl font-bold mb-2"><span id="titleName">Student</span>'s Progress</h1>
      <p id="dispDate" class="opacity-80 font-light italic">Report Date: --</p>
    </header>

    <div class="report-card p-8 mb-8 flex items-center gap-6">
      <div class="w-20 h-20 rounded-full bg-indigo-500 flex items-center justify-center text-4xl shadow-lg text-white font-bold shadow-indigo-200">👨‍🎓</div>
      <div>
        <h2 id="cardName" class="text-3xl font-bold text-gray-800 tracking-tight">Name</h2>
        <div class="mt-1"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold italic shadow-sm">🌟 Making Great Progress!</span></div>
      </div>
    </div>

    <div class="report-card p-8 md:p-10 space-y-8">
      <h3 class="text-xl font-bold text-gray-800 flex items-center gap-2 border-b pb-4">📊 Skills Analysis</h3>
      <div class="space-y-7">
        <div>
          <div class="flex justify-between mb-2 font-bold text-gray-600 uppercase text-xs tracking-widest"><span>📖 Reading</span><span id="v-r" class="text-indigo-600 text-lg">0%</span></div>
          <div class="h-4 bg-gray-100 rounded-full overflow-hidden shadow-inner"><div id="b-r" class="skill-bar bg-gradient-to-r from-indigo-400 to-indigo-600" style="width: 0%"></div></div>
        </div>
        <div>
          <div class="flex justify-between mb-2 font-bold text-gray-600 uppercase text-xs tracking-widest"><span>✍️ Writing</span><span id="v-w" class="text-purple-600 text-lg">0%</span></div>
          <div class="h-4 bg-gray-100 rounded-full overflow-hidden shadow-inner"><div id="b-w" class="skill-bar bg-gradient-to-r from-purple-400 to-purple-600" style="width: 0%"></div></div>
        </div>
        <div>
          <div class="flex justify-between mb-2 font-bold text-gray-600 uppercase text-xs tracking-widest"><span>🎧 Listening</span><span id="v-l" class="text-pink-600 text-lg">0%</span></div>
          <div class="h-4 bg-gray-100 rounded-full overflow-hidden shadow-inner"><div id="b-l" class="skill-bar bg-gradient-to-r from-pink-400 to-pink-600" style="width: 0%"></div></div>
        </div>
        <div>
          <div class="flex justify-between mb-2 font-bold text-gray-600 uppercase text-xs tracking-widest"><span>🗣️ Speaking</span><span id="v-s" class="text-orange-600 text-lg">0%</span></div>
          <div class="h-4 bg-gray-100 rounded-full overflow-hidden shadow-inner"><div id="b-s" class="skill-bar bg-gradient-to-r from-orange-400 to-orange-600" style="width: 0%"></div></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0TrGJYR9ywCx79tzUu8JGiOASatbpL6EBUNsgZYjGBc0wtI_vbhGsayUhqU0YJOdmwkWZHgAIWNZY/pub?output=csv";
    let students = [];

    async function fetchData() {
      try {
        const response = await fetch(sheetURL + '&cache=' + Math.random());
        const text = await response.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        
        // تحويل الصفوف إلى بيانات منظمة وتجاهل أي رموز في العناوين
        students = rows.slice(1).map(row => {
          const cols = row.split(',').map(item => item.trim().replace(/^"|"$/g, ''));
          return {
            name: cols[0],
            r: cols[1], w: cols[2], l: cols[3], s: cols[4],
            date: cols[5]
          };
        }).filter(s => s.name);

        const sel = document.getElementById('studentSelect');
        sel.innerHTML = '<option value="">-- اختر الطالب --</option>';
        
        students.forEach((s, i) => {
          let opt = document.createElement('option');
          opt.value = i;
          opt.innerText = s.name;
          sel.appendChild(opt);
        });

        console.log("Data Loaded:", students);
      } catch (e) {
        console.error("Fetch Error:", e);
      }
    }

    function renderStudent() {
      const idx = document.getElementById('studentSelect').value;
      if (idx === "") return;
      
      const s = students[idx];
      document.getElementById('reportArea').style.opacity = 1;
      document.getElementById('titleName').innerText = s.name;
      document.getElementById('cardName').innerText = s.name;
      document.getElementById('dispDate').innerText = "Report Date: " + (s.date || "March 2026");

      const up = (vId, bId, val) => {
        const n = val ? val.replace(/[^0-9]/g, '') : 0;
        document.getElementById(vId).innerText = n + "%";
        document.getElementById(bId).style.width = n + "%";
      }
      
      up('v-r','b-r', s.r); up('v-w','b-w', s.w);
      up('v-l','b-l', s.l); up('v-s','b-s', s.s);
    }

    window.onload = fetchData;
  </script>
</body>
</html>
