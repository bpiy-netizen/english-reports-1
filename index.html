<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>51Talk Official Progress Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    body { background: #f3f4f6; min-height: 100vh; padding: 20px; color: #1f2937; }
    
    .header-gradient { 
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%); 
      border-radius: 24px 24px 0 0; 
      color: white; 
    }
    .report-card { 
      background: #ffffff; 
      border-radius: 24px; 
      box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.1); 
      max-width: 1000px; margin: 0 auto; 
    }
    .skill-card { 
      background: white; 
      border: 1px solid #f1f5f9; 
      border-radius: 20px; 
      padding: 24px; 
    }
    .progress-bar-bg { background: #f1f5f9; height: 10px; border-radius: 5px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 5px; transition: width 1.5s ease-out; }
    
    /* الحل النهائي لثبات الرقم والنسبة المئوية % */
    .stat-container {
      display: flex !important;
      flex-direction: row !important;
      align-items: baseline !important;
      gap: 2px !important;
      white-space: nowrap !important;
    }

    /* تكبير الأيقونات بجانب المهارات */
    .skill-emoji {
      font-size: 1.6rem; 
      margin-right: 12px;
      display: inline-block;
      vertical-align: middle;
    }

    .logo-frame { 
      border-radius: 3.5rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .human-signature { 
      font-family: 'Inter', sans-serif; 
      color: #1a202c; 
      font-size: 1.6rem; 
      font-weight: 600; 
      letter-spacing: -1px; 
      transform: rotate(-1.5deg); 
      display: inline-block;
      white-space: nowrap;
    }

    .next-goal-card {
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border: 2px dashed #f59e0b;
      border-radius: 2rem;
      padding: 2rem;
      position: relative;
    }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>

  <div class="no-print max-w-5xl mx-auto mb-10 bg-white p-6 rounded-3xl shadow-xl flex flex-wrap gap-4 items-end border border-slate-100">
    <div class="flex-1 min-w-[250px]">
      <label class="block text-slate-500 text-xs font-bold mb-3 uppercase tracking-[0.2em] text-right">Student Record Access</label>
      <select id="studentSelect" onchange="renderStudent()" class="w-full p-4 rounded-2xl border border-slate-200 text-slate-900 font-bold focus:ring-4 focus:ring-sky-500/20 outline-none transition-all">
        <option value="">-- Jari التحميل... --</option>
      </select>
    </div>
    <div class="flex gap-2">
      <button onclick="fetchData()" class="bg-sky-600 hover:bg-sky-500 text-white px-6 py-4 rounded-2xl font-bold transition-all active:scale-95">Update 🔄</button>
      <button onclick="downloadImage()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-emerald-100 text-sm">Save Image 🖼️</button>
    </div>
  </div>
