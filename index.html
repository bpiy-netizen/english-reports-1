<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITalk Premium Progress Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Outfit', sans-serif; }
    body { background: #f3f4f6; min-height: 100vh; padding: 20px; }
    .header-gradient { 
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%); 
      border-radius: 24px 24px 0 0; 
      color: white; 
    }
    .report-card { 
      background: #ffffff; 
      border-radius: 24px; 
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); 
      max-width: 1000px; margin: 0 auto; 
    }
    .skill-card { 
      background: white; 
      border: 1px solid #f1f5f9; 
      border-radius: 20px; 
      padding: 24px; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .skill-card:hover { border-color: #cbd5e1; transform: translateY(-4px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); }
    .progress-bar-bg { background: #f1f5f9; height: 12px; border-radius: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 6px; transition: width 1.5s ease-out; }
    .stat-badge { 
      font-size: 0.75rem; padding: 4px 12px; border-radius: 99px; 
      font-weight: 700; display: inline-flex; align-items: center; gap: 4px; 
    }
    .trend-up { color: #10b981; background: #ecfdf5; border: 1px solid #10b981; }
    .trend-down { color: #ef4444; background: #fef2f2; border: 1px solid #ef4444; }
    .trend-neutral { color: #6b7280; background: #f3f4f6; border: 1px solid #e5e7eb; }
    @media print { 
      .no-print { display: none !important; } 
      body { padding: 0; background: white; } 
      .report-card { border: none; box-shadow: none; width: 100%; margin: 0; border-radius: 0; }
    }
  </style>
</head>
<body>

  <div class="no-print max-w-5xl mx-auto mb-10 bg-white p-6 rounded-3xl shadow-xl flex flex-wrap gap-4 items-end border border-slate-100">
    <div class="flex-1 min-w-[250px]">
      <label class="block text-slate-500 text-xs font-bold mb-3 uppercase tracking-[0.2em] text-right">Student Selection</label>
      <select id="studentSelect" onchange="renderStudent()" class="w-full p-4 rounded-2xl border border-slate-200 text-slate-900 font-bold focus:ring-4 focus:ring-sky-500/20 outline-none transition-all">
        <option value="">-- Loading Students... --</option>
      </select>
    </div>
    <div class="flex gap-3">
      <button onclick="fetchData()" class="bg-sky-600 hover:bg-sky-500 text-white px-8 py-4 rounded-2xl font-bold transition-all active:scale-95 flex items-center gap-2 shadow-lg shadow-sky-200">Update 🔄</button>
      <button onclick="window.print()" class="bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold transition-all active:scale-95 flex items-center gap-2 shadow-lg shadow-slate-200">Save PDF 🖨️</button>
    </div>
  </div>

  <div id="reportArea" class="report-card opacity-0 transition-opacity duration-1000">
    
    <div class="header-gradient p-12 flex flex-col items-center justify-center">
      <div class="mb-8 relative">
        <div class="absolute inset-0 bg-sky-500/20 blur-3xl rounded-full"></div>
        <div class="relative w-52 h-52 flex items-center justify-center overflow-hidden bg-white/5 backdrop-blur-md rounded-[2.5rem] p-6 border border-white/10 shadow-2xl">
          <img src="logo.png" alt="SITalk Logo" class="max-w-full max-h-full object-contain">
        </div>
      </div>

      <div class="text-center">
        <h2 class="text-xs uppercase font-bold tracking-[0.6em] text-sky-400/80 mb-4">English Progress Report</h2>
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6" id="cardName">Student Name</h1>
        
        <div class="flex items-center justify-center gap-8 pt-6 border-t border-white/10">
          <div class="text-center">
            <p class="text-[10px] uppercase font-bold opacity-40 tracking-widest mb-1">Issue Date</p>
            <p class="text-sm font-bold text-white" id="dispDate">March 11, 2026</p>
          </div>
          <div class="w-px h-10 bg-white/10"></div>
          <div class="text-center">
            <p class="text-[10px] uppercase font-bold opacity-40 tracking-widest mb-1">Accreditation</p>
            <p class="text-sm font-bold text-white">Official SITalk Document</p>
          </div>
        </div>
      </div>
    </div>

    <div class="p-8 md:p-14 space-y-12">
      
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8 items-center bg-slate-50 p-10 rounded-[2rem] border border-slate-100">
        <div class="flex items-center gap-5 col-span-1 md:col-span-2">
          <div class="w-20 h-20 bg-white text-sky-600 rounded-2xl flex items-center justify-center text-4xl shadow-sm border border-slate-100">🎓</div>
          <div>
            <h3 class="font-bold text-slate-900 text-2xl">Performance Summary</h3>
            <p class="text-slate-500 text-sm">Comprehensive skill analysis for this period.</p>
          </div>
        </div>
        <div class="text-center md:border-r border-slate-200 px-4">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Overall Grade</p>
          <span class="text-5xl font-bold text-sky-600" id="avgNow">0%</span>
        </div>
        <div class="text-center px-4">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Total Progress</p>
          <div class="flex items-center justify-center gap-3">
            <span class="text-4xl font-bold text-slate-800" id="avgDiff">0%</span>
            <span id="avgTrendIcon" class="text-3xl"></span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="skillsGrid"></div>
      
      <div class="mt-20 pt-12 border-t border-slate-100 flex justify-between items-end">
        <div class="bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100">
          <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mb-2">Academic Status</p>
          <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-slate-900 font-bold text-sm">Verified Progress</span>
          </div>
        </div>
        <div class="text-right">
          <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mb-4 text-center">Educational Director</p>
          <div class="h-16 w-56 ml-auto border-b-2 border-slate-900/10 mb-2"></div>
          <p class="text-slate-900 font-black text-sm uppercase tracking-tighter">SITalk Management</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0TrGJYR9ywCx79tzUu8JGiOASatbpL6EBUNsgZYjGBc0wtI_vbhGsayUhqU0YJOdmwkWZHgAIWNZY/pub?output=csv";
    let students = [];

    async function fetchData() {
      try {
        const response = await fetch(sheetURL + '&cache=' + new Date().getTime());
        const text = await response.text();
        const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
        students = rows.slice(1).map(row => {
          const c = row.split(',').map(i => i.trim().replace(/^"|"$/g, ''));
          return {
            name: c[0],
            skills: [
              { label: "Reading", now: c[1], old: c[2], color: "linear-gradient(90deg, #6366f1, #818cf8)", icon: "📖" },
              { label: "Vocabulary", now: c[3], old: c[4], color: "linear-gradient(90deg, #ec4899, #f472b6)", icon: "📝" },
              { label: "Listening", now: c[5], old: c[6], color: "linear-gradient(90deg, #3b82f6, #60a5fa)", icon: "🎧" },
              { label: "Speaking", now: c[7], old: c[8], color: "linear-gradient(90deg, #f59e0b, #fbbf24)", icon: "🗣️" },
              { label: "Grammar", now: c[9], old: c[10], color: "linear-gradient(90deg, #10b981, #34d399)", icon: "📏" }
            ],
            date: c[11]
          };
        }).filter(s => s.name);

        const sel = document.getElementById('studentSelect');
        sel.innerHTML = '<option value="">-- Select Student --</option>';
        students.forEach((s, i) => {
          let opt = document.createElement('option');
          opt.value = i; opt.innerText = s.name;
          sel.appendChild(opt);
        });
      } catch (e) { console.error(e); }
    }

    function renderStudent() {
      const idx = document.getElementById('studentSelect').value;
      if (idx === "") return;
      const s = students[idx];
      document.getElementById('reportArea').classList.remove('opacity-0');
      document.getElementById('cardName').innerText = s.name;
      document.getElementById('dispDate').innerText = s.date || "March 11, 2026";

      let sumNow = 0, sumDiff = 0, count = 0;
      const grid = document.getElementById('skillsGrid');
      grid.innerHTML = "";

      s.skills.forEach(skill => {
        const nowVal = parseInt(skill.now) || 0;
        const oldVal = parseInt(skill.old) || 0;
        const diff = nowVal - oldVal;
        sumNow += nowVal; sumDiff += diff; count++;
        
        const trendIcon = diff > 0 ? "▲" : (diff < 0 ? "▼" : "•");
        const trendClass = diff > 0 ? "trend-up" : (diff < 0 ? "trend-down" : "trend-neutral");

        grid.innerHTML += `
          <div class="skill-card">
            <div class="flex justify-between items-start mb-4">
              <div class="flex items-center gap-4">
                <div class="text-3xl w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100">${skill.icon}</div>
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">${skill.label}</span>
              </div>
              <div class="text-right">
                <span class="stat-badge ${trendClass}">${trendIcon} ${Math.abs(diff)}%</span>
              </div>
            </div>
            <div class="flex justify-between items-end mb-3">
              <div class="text-4xl font-bold text-slate-900">${nowVal}<span class="text-xl opacity-30">%</span></div>
              <div class="text-[10px] font-bold text-slate-400 uppercase">Prev: ${oldVal}%</div>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width: 0%; background: ${skill.color}" id="bar-${skill.label}"></div>
            </div>
          </div>
        `;
        setTimeout(() => { document.getElementById('bar-'+skill.label).style.width = nowVal + "%"; }, 150);
      });

      const avgNow = Math.round(sumNow / count);
      const avgDiff = Math.round(sumDiff / count);
      document.getElementById('avgNow').innerText = avgNow + "%";
      document.getElementById('avgDiff').innerText = Math.abs(avgDiff) + "%";
      document.getElementById('avgTrendIcon').innerText = avgDiff >= 0 ? "📈" : "📉";
      document.getElementById('avgTrendIcon').className = avgDiff >= 0 ? "text-emerald-500 text-3xl" : "text-rose-500 text-3xl";
    }
    window.onload = fetchData;
  </script>
</body>
</html>
